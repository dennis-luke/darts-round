<div class="admin-container">
  <div class="top-bar">
    <div class="initial-score">
      <label>Initial Score:</label>
      <input type="number" [(ngModel)]="initialScore" min="0" />
    </div>
    <button class="control-btn update-btn" (click)="updateScoreboard()">Update Scoreboard</button>
    <button class="control-btn reset-btn" (click)="resetAnswers()">Reset</button>
    <button class="control-btn hurry-up-btn" (click)="hurryUp()">Hurry Up</button>
    <button class="control-btn switch-btn" (click)="switch()">Switch</button>
  </div>

  <div class="answer-file-bar">
    <div class="upload-section">
      <input type="text" [(ngModel)]="newFileName" placeholder="File name" class="file-name-input" />
      <label class="file-input-label">
        Choose File
        <input type="file" #fileInput (change)="onFileSelected($event)" accept=".csv" class="file-input" />
      </label>
      <button class="control-btn upload-btn" (click)="uploadFile()">Upload</button>
    </div>

    <div class="select-section">
      <label>Answers File:</label>
      <select [(ngModel)]="selectedFileName" (ngModelChange)="onFileSelectionChange()" class="file-select">
        <option value="">-- Select File --</option>
        @for (file of answerFiles; track file.name) {
          <option [value]="file.name">{{ file.name }}</option>
        }
      </select>
      @if (selectedFileName) {
        <button class="control-btn delete-btn" (click)="deleteSelectedFile()">Delete</button>
      }
    </div>

    <button class="control-btn reset-btn" (click)="downloadExample()">Download Example</button>

    @if (uploadError) {
      <div class="error-message">{{ uploadError }}</div>
    }
  </div>

  <div class="teams-container" [class.reverse]="reverse">
    <app-team-admin
      team="left"
      [teamName]="leftTeam.teamName"
      [points]="leftTeam.points"
      [scores]="leftTeam.scores"
      [availableAnswers]="selectedAnswers"
      (teamChange)="updateLeftTeam($event)"
    ></app-team-admin>

    <app-team-admin
      team="right"
      [teamName]="rightTeam.teamName"
      [points]="rightTeam.points"
      [scores]="rightTeam.scores"
      [availableAnswers]="selectedAnswers"
      (teamChange)="updateRightTeam($event)"
    ></app-team-admin>
  </div>
</div>
