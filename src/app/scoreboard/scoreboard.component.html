<div class="container">
    <button class="fullscreen-btn" (click)="toggleFullscreen()" [title]="isFullscreen ? 'Exit fullscreen' : 'Enter fullscreen'">
      <svg *ngIf="!isFullscreen" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M21 8V5a2 2 0 0 0-2-2h-3"/><path d="M3 16v3a2 2 0 0 0 2 2h3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/>
      </svg>
      <svg *ngIf="isFullscreen" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M8 3v3a2 2 0 0 1-2 2H3"/><path d="M21 8h-3a2 2 0 0 1-2-2V3"/><path d="M3 16h3a2 2 0 0 1 2 2v3"/><path d="M16 21v-3a2 2 0 0 1 2-2h3"/>
      </svg>
    </button>
    <div class="team-container left-team-container">
      <div class="inner-team-container">
        <app-team-board side="left" [initialScore]="gameState.initialScore" [teamScores]="gameState.leftTeam"></app-team-board>
      </div>
    </div>

    <div class="team-container right-team-container">
      <div class="inner-team-container">
        <app-team-board side="right" [initialScore]="gameState.initialScore" [teamScores]="gameState.rightTeam"></app-team-board>
      </div>
    </div>
  </div>
