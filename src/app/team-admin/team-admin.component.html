<div class="team-admin" [class.left]="team === 'left'" [class.right]="team === 'right'">

  <div class="field">
    <label>Team Name:</label>
    <input type="text" [(ngModel)]="teamName" (ngModelChange)="updateTeam()" />
  </div>

  <div class="field">
    <label>Points (rounds won):</label>
    <input type="number" [(ngModel)]="points" (ngModelChange)="updateTeam()" min="0" />
  </div>

  <div class="scores">
    <h3>Scores</h3>
    <table>
      <thead>
        <tr>
          <th class="row-num">#</th>
          <th class="col-pass">Pass</th>
          <th class="col-answer">Answer Text</th>
          <th class="col-score">Points</th>
        </tr>
      </thead>
      <tbody>
        @for (score of scores; track team + $index; let i = $index) {
          <tr>
            <td class="row-num">{{ i + 1 }}</td>
            <td class="col-pass">
              <input
                type="checkbox"
                [checked]="score.pass"
                (change)="updateScore(i, 'pass', $any($event.target).checked)"
              />
            </td>
            <td class="col-answer">
              @if (isAnswerFileMode) {
                <select [value]="score.answerText" (change)="onAnswerSelect(i, $any($event.target).value)">
                  <option value="">-- Select Answer --</option>
                  @for (answer of availableAnswers; track answer.answer) {
                    <option [value]="answer.answer">{{ answer.answer }}</option>
                  }
                </select>
              } @else {
                <input
                  type="text"
                  [value]="score.answerText"
                  (input)="updateScore(i, 'answerText', $any($event.target).value)"
                />
              }
            </td>
            <td class="col-score">
              @if (isAnswerFileMode) {
                <span class="readonly-score">{{ score.score ?? '?' }}</span>
              } @else {
                <input
                  type="number"
                  [value]="score.score"
                  (input)="updateScore(i, 'score', $any($event.target).value)"
                  placeholder="?"
                />
              }
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</div>
