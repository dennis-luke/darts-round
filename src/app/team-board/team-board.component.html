
<app-giphy-overlay [giphyUrl]="chickenGiphyUrl" [visible]="showChickenGiphy" alt="Chicken" (hidden)="showChickenGiphy = false"></app-giphy-overlay>
<app-giphy-overlay [giphyUrl]="cliffGiphyUrl" [visible]="showCliffGiphy" alt="Cliff" (hidden)="showCliffGiphy = false"></app-giphy-overlay>
<app-giphy-overlay [giphyUrl]="celebrationGiphyUrl" [visible]="showCelebrationGiphy" alt="Celebration" (hidden)="showCelebrationGiphy = false"></app-giphy-overlay>
<app-giphy-overlay [giphyUrl]="hurryUpGiphyUrl" [visible]="showHurryUpGiphy" alt="Hurry Up" (hidden)="showHurryUpGiphy = false"></app-giphy-overlay>
<div class="team-title">{{ teamName }}</div>
@if (score >= 0) {
    <div class="score" [ngClass]="{'score-animating': animating}">{{ score }}</div>
} @else {
    <div class="score">❌</div>
}
<div class="points">Rounds won: {{ points }}</div>
<div class="bottom-section">
    <div class="answers-container">
        @for (answerScore of answerScores; track teamName + 'answer' + $index) {
            <div class="answer-container">
                @if (answerScore.pass) {
                    <div class="answer-score">🐔</div>
                } @else if (answerScore.score !== null) {
                    <div class="answer-score">{{ answerScore.score }}</div>
                } @else {
                    <div class="answer-score">?</div>
                }
                <div class="answer-text">{{ answerScore.answerText }}</div>
            </div>
        }
    </div>
</div>
